<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Ways Music Ultra</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{display:flex;background:#121212;color:white;}

.sidebar{
  width:230px;
  background:#000;
  padding:20px;
  height:100vh;
}
.sidebar h2{color:#1db954;margin-bottom:20px;}
.sidebar p{color:#aaa;margin:10px 0;}

.main{
  flex:1;
  padding:20px;
}

.song-list{
  margin-top:20px;
}

.song{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  cursor:pointer;
  border-radius:5px;
}
.song:hover{
  background:#282828;
}

.song img{
  width:50px;
  height:50px;
}

.player{
  position:fixed;
  bottom:0;
  left:230px;
  right:0;
  background:#181818;
  padding:10px;
  display:flex;
  align-items:center;
  gap:15px;
}

.player img{
  width:50px;
}

iframe{
  height:80px;
  width:300px;
  border:none;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>🎵 Ways Music</h2>
  <p>Home</p>
  <p>Search</p>
</div>

<div class="main">
  <h2>🔥 Trending</h2>
  <div class="song-list" id="songs"></div>
</div>

<div class="player">
  <img id="cover">
  <div>
    <div id="title">Pilih lagu</div>
    <div id="artist" style="color:#aaa;font-size:13px;"></div>
  </div>
  <div id="ytPlayer"></div>
</div>

<script src="script.js"></script>
</body>
</html>
