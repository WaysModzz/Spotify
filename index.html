<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Khusnizyy Playlist </title>
<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0a0f1f, #000);
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:25px;
}

.title {
  font-size:26px;
  font-weight:bold;
  color:#00eaff;
  text-shadow: 0 0 10px #00eaff, 0 0 25px #008cff;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 10px #00eaff; }
  to { text-shadow:0 0 30px #00eaff, 0 0 50px #008cff; }
}

.owner {
  margin-top:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
}

.owner img {
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #00eaff;
  box-shadow:0 0 10px #00eaff;
}

.owner-info {
  text-align:left;
}

.owner-name {
  font-weight:bold;
  font-size:15px;
}

.owner a {
  font-size:13px;
  color:#00eaff;
  text-decoration:none;
}

.owner a:hover {
  text-shadow:0 0 10px #00eaff;
}

/* CONTAINER */
.container {
  padding:20px;
}

/* PLAYLIST TITLE */
h2 {
  margin-top:25px;
  color:#00eaff;
  text-shadow:0 0 8px #00eaff;
}

/* IFRAME CARD */
iframe {
  width:100%;
  height:380px;
  border-radius:15px;
  margin-top:15px;
  border:1px solid rgba(0,234,255,0.3);
  box-shadow: 0 0 15px rgba(0,234,255,0.2);
  transition:0.3s;
}

iframe:hover {
  transform:scale(1.01);
  box-shadow: 0 0 30px rgba(0,234,255,0.6);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">
    <i class="fas fa-music"></i> Ways Music Player
  </div>

  <div class="owner">
  <img src="https://unavatar.io/instagram/khusnizyy">

  <div class="owner-info">
    <div class="owner-name">Ways Ganz</div>
    <a href="https://instagram.com/khusnizyy" target="_blank">
      <i class="fab fa-instagram"></i> @khusnizyy
    </a>
  </div>
</div>
</div>

<!-- CONTENT -->
<div class="container">

<h2>Playlist 1</h2>
<iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1E4tOS1lg4Kdgo"
allow="autoplay; clipboard-write; encrypted-media; fullscreen"></iframe>

<h2>Playlist 2</h2>
<iframe src="https://open.spotify.com/embed/playlist/3mZQtSM8M4bSL0tWjlMRaJ"
allow="autoplay; clipboard-write; encrypted-media; fullscreen"></iframe>

<h2>Playlist 3</h2>
<iframe src="https://open.spotify.com/embed/playlist/6tDsLkA1qQcyZrEXhxqkgU"
allow="autoplay; clipboard-write; encrypted-media; fullscreen"></iframe>

<h2>Playlist 4</h2>
<iframe src="https://open.spotify.com/embed/playlist/4ks1RnBEuEsqmtYt1t5dl0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen"></iframe>

</div>

</body>
</html>
